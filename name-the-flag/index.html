<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#101418" />
  <title>Name the Flag</title>
  <style>
    :root {
      --bg: #101418;
      --card: #171d24;
      --card-2: #1d252e;
      --text: #f2f5f8;
      --muted: #8f9baa;
      --accent: #7dd3fc;
      --accent-2: #a855f7;
      --soft: rgba(255,255,255,0.08);
      --gold: #ffbf49;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background:
        radial-gradient(circle at top left, rgba(125, 211, 252, 0.10), transparent 36%),
        radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.10), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      display: grid;
      place-items: center;
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
    }

    .app {
      width: min(94vw, 820px);
      height: min(94dvh, 640px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      padding: 16px;
    }

    .topbar,
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: clamp(12px, 1.8vw, 15px);
      letter-spacing: 0.02em;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pill {
      border: 1px solid var(--soft);
      background: rgba(255,255,255,0.04);
      border-radius: 999px;
      padding: 8px 14px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      white-space: nowrap;
    }
    .pill strong { color: var(--text); font-weight: 600; }

    /* ---------- Stage ---------- */
    .stage {
      position: relative;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
        var(--card);
      box-shadow:
        0 28px 80px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.08);
      overflow: hidden;
      isolation: isolate;
      min-height: 0;
      touch-action: pan-y;
    }
    .stage::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.045);
      pointer-events: none;
    }

    .brand-card {
      width: min(86%, 560px);
      max-height: 86%;
      display: grid;
      place-items: center;
      padding: clamp(18px, 4vw, 40px);
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.10), transparent 42%),
        var(--card-2);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 18px 50px rgba(0,0,0,0.32);
      transition: transform 280ms ease, opacity 230ms ease, filter 280ms ease;
    }
    .brand-card.switching {
      opacity: 0;
      transform: translateY(10px) scale(0.985);
      filter: blur(7px);
    }

    .brand {
      width: 100%;
      display: grid;
      place-items: center;
    }

    /* Uniform white card holding the image. Fixed 4:3 ratio so every
       logo/portrait sits in the same rectangle, regardless of source. */
    .image-frame {
      position: relative;
      display: block;
      width: min(88%, 520px);
      aspect-ratio: 4 / 3;
      background: rgba(255,255,255,0.96);
      padding: 14px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 12px 30px rgba(0,0,0,0.30),
        inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .brand-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    .scratch-cover {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      touch-action: none;
      cursor: grab;
      transition: opacity 380ms ease;
    }
    .image-frame.scratch-on .scratch-cover { display: block; }
    .image-frame.scratch-on { cursor: grab; }

    .answer {
      position: absolute;
      right: 22px;
      bottom: 18px;
      color: rgba(255,255,255,0.40);
      font-size: 13px;
      letter-spacing: 0.12em;
      opacity: 0;
      transform: translateY(8px);
      transition: 220ms ease;
      pointer-events: none;
      text-transform: uppercase;
    }
    .show-answer .answer {
      opacity: 1;
      transform: translateY(0);
    }

    /* ---------- Footer / buttons ---------- */
    .hint {
      opacity: 0.85;
      flex: 1;
      min-width: 0;
    }
    .footer-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    button {
      color: var(--text);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 140ms ease, transform 80ms ease, border-color 140ms ease, color 140ms ease;
    }
    button:hover { background: rgba(255,255,255,0.11); }
    button:active { transform: scale(0.97); }
    button.primary {
      background: rgba(125, 211, 252, 0.15);
      border-color: rgba(125, 211, 252, 0.30);
      color: #cdeefe;
    }
    button.primary:hover { background: rgba(125, 211, 252, 0.22); }

    /* Toggle button "on" state (used for Scratch) */
    button.toggle.on {
      background: rgba(255, 191, 73, 0.20);
      border-color: rgba(255, 191, 73, 0.55);
      color: #ffe0a0;
    }
    button.toggle.on:hover { background: rgba(255, 191, 73, 0.28); }

    /* Icon-only buttons (Shuffle, Scratch toggle) */
    button.icon {
      width: 42px;
      height: 42px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    button.icon svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    /* Carousel nav buttons (Prev / Next) flank the card inside the stage */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
      background: rgba(20, 25, 35, 0.65);
      border-color: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: rgba(255, 255, 255, 0.92);
    }
    .nav-btn:hover {
      background: rgba(30, 36, 48, 0.85);
      border-color: rgba(255, 255, 255, 0.22);
    }
    .nav-btn:active { transform: translateY(-50%) scale(0.94); }
    .nav-prev { left: 14px; }
    .nav-next { right: 14px; }

    /* ---------- Done state ---------- */
    .done {
      text-align: center;
      color: var(--text);
    }
    .done .tick {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 28px;
      margin-bottom: 18px;
    }
    .done h1 {
      margin: 0 0 6px;
      font-size: clamp(22px, 4.4vw, 28px);
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .done p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    /* ---------- Small screens ---------- */
    @media (max-width: 520px) {
      .app { padding: 10px; gap: 12px; height: 96dvh; }
      .footer { flex-wrap: wrap; justify-content: center; }
      .pill { padding: 7px 12px; }
      .brand-card { width: 92%; padding: 18px; }
      .image-frame { width: 92%; padding: 10px; }
      .answer { left: 0; right: 0; bottom: 14px; text-align: center; }
      .hint { display: none; }
      button { padding: 11px 14px; }
      button.icon { padding: 0; width: 44px; height: 44px; }
      button.icon svg { width: 20px; height: 20px; }
      .nav-prev { left: 6px; }
      .nav-next { right: 6px; }
    }

    /* ---------- Landscape phones ---------- */
    @media (orientation: landscape) and (max-height: 500px) {
      .app { height: 96dvh; gap: 8px; padding: 8px; }
      .brand-card { padding: 12px; }
      .image-frame { width: min(60%, 360px); padding: 10px; }
      .answer { bottom: 10px; right: 14px; }
      button { padding: 8px 14px; font-size: 13px; }
    }
  </style>
</head>

          <path d="M15 6l-6 6 6 6"/>

      <div id="card" class="brand-card">

      <button id="nextBtn" type="button" class="icon nav-btn nav-next" aria-label="Next" title="Next">

    <div class="footer">

            <path d="M4 20L21 3"/>
            <path d="M21 16v5h-5"/>
            <path d="M15 15l6 6"/>
            <path d="M4 4l5 5"/>
          </svg>
        </button>
      </div>
    </div>
  </main>

    const features = {};

    let order = items.slice();
    let index = 0;
    let answerVisible = false;
    let finished = false;
    let scratchMode = false;

    const stage      = document.getElementById('stage');
    const card       = document.getElementById('card');
    const brandEl    = document.getElementById('brand');
    const answerEl   = document.getElementById('answer');
    const counterEl  = document.getElementById('counter');
    const totalEl    = document.getElementById('total');
    const scratchBtn = document.getElementById('scratchBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const prevBtn    = document.getElementById('prevBtn');
    const nextBtn    = document.getElementById('nextBtn');

    // Hide opt-in features that aren't enabled for this project.
    if (!features.scratch) scratchBtn.remove();

    function shuffleInPlace(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
      }
    }

    /* ---------- Scratch-card overlay ---------- */

    function paintScratchCover(canvas) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;

      // Metallic silver gradient
      const g = ctx.createLinearGradient(0, 0, w, h);
      g.addColorStop(0,    '#c4cad3');
      g.addColorStop(0.5,  '#9ea3ad');
      g.addColorStop(1,    '#cfd4dc');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);

      // Speckled noise (light + dark)
      ctx.globalAlpha = 1;
      for (let i = 0; i < 900; i++) {
        ctx.fillStyle = 'rgba(255,255,255,' + (Math.random() * 0.10) + ')';
        ctx.fillRect(Math.random() * w, Math.random() * h, 1, 1);
      }
      for (let i = 0; i < 700; i++) {
        ctx.fillStyle = 'rgba(0,0,0,' + (Math.random() * 0.06) + ')';
        ctx.fillRect(Math.random() * w, Math.random() * h, 1, 1);
      }

      // "SCRATCH" hint
      ctx.fillStyle = 'rgba(40,40,40,0.55)';
      const fs = Math.max(20, Math.min(w / 11, 56));
      ctx.font = '700 ' + fs + 'px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('SCRATCH', w / 2, h / 2 - fs * 0.35);
      ctx.font = '500 ' + (fs * 0.4) + 'px Inter, sans-serif';
      ctx.fillStyle = 'rgba(40,40,40,0.45)';
      ctx.fillText('to reveal', w / 2, h / 2 + fs * 0.45);
    }

    function attachScratch(frame, canvas) {
      const ctx = canvas.getContext('2d');
      let drawing = false;
      let lastX = 0, lastY = 0;
      let revealed = false;

      function pos(e) {
        const rect = canvas.getBoundingClientRect();
        const pt = (e.touches && e.touches[0])
                 || (e.changedTouches && e.changedTouches[0])
                 || e;
        const sx = canvas.width / rect.width;
        const sy = canvas.height / rect.height;
        return {
          x: (pt.clientX - rect.left) * sx,
          y: (pt.clientY - rect.top)  * sy,
        };
      }

      function erase(x, y, fromLast) {
        ctx.globalCompositeOperation = 'destination-out';
        const r = Math.max(28, canvas.width / 14);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        if (fromLast) {
          ctx.lineWidth = r * 2;
          ctx.beginPath();
          ctx.moveTo(lastX, lastY);
          ctx.lineTo(x, y);
          ctx.stroke();
        }
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
        lastX = x; lastY = y;
      }

      function maybeRevealAll() {
        if (revealed) return;
        const w = canvas.width, h = canvas.height;
        const img = ctx.getImageData(0, 0, w, h).data;
        let cleared = 0, total = 0;
        const step = 16;
        for (let y = 0; y < h; y += step) {
          for (let x = 0; x < w; x += step) {
            total++;
            if (img[(y * w + x) * 4 + 3] === 0) cleared++;
          }
        }
        if (cleared / total > 0.40) {
          revealed = true;
          canvas.style.opacity = '0';
          setTimeout(function () {
            frame.classList.remove('scratch-on');
          }, 380);
        }
      }

      function start(e) {
        if (e.cancelable) e.preventDefault();
        e.stopPropagation();
        drawing = true;
        const p = pos(e);
        lastX = p.x; lastY = p.y;
        erase(p.x, p.y, false);
      }
      function move(e) {
        if (!drawing) return;
        if (e.cancelable) e.preventDefault();
        e.stopPropagation();
        const p = pos(e);
        erase(p.x, p.y, true);
      }
      function end(e) {
        if (!drawing) return;
        if (e && e.cancelable) e.preventDefault();
        if (e) e.stopPropagation();
        drawing = false;
        maybeRevealAll();
      }

      canvas.addEventListener('mousedown', start);
      window.addEventListener('mousemove', move);
      window.addEventListener('mouseup', end);
      canvas.addEventListener('touchstart', start, { passive: false });
      canvas.addEventListener('touchmove',  move,  { passive: false });
      canvas.addEventListener('touchend',   end);
      canvas.addEventListener('touchcancel', end);
    }

    function mountScratchCover(frame, img) {
      const existing = frame.querySelector('.scratch-cover');
      if (existing) existing.remove();

      // Size canvas to the entire frame (including the white padding around
      // the logo) — gives a uniform scratch-card look regardless of the
      // logo's aspect ratio.
      const rect = frame.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) {
        requestAnimationFrame(function () { mountScratchCover(frame, img); });
        return;
      }
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const canvas = document.createElement('canvas');
      canvas.className = 'scratch-cover';
      canvas.width  = Math.round(rect.width  * dpr);
      canvas.height = Math.round(rect.height * dpr);

      paintScratchCover(canvas);

      frame.appendChild(canvas);
      frame.classList.add('scratch-on');
      attachScratch(frame, canvas);
    }

    /* ---------- Render ---------- */

    function render() {
      const item = order[index];
      card.className = 'brand-card switching';
      stage.classList.remove('show-answer');
      answerVisible = false;

      setTimeout(function () {
        brandEl.innerHTML = '';

        const frame = document.createElement('div');
        frame.className = 'image-frame';

        const img = document.createElement('img');
        img.src = item.src;
        img.alt = item.name;
        img.draggable = false;
        img.className = 'brand-image';

        frame.appendChild(img);
        brandEl.appendChild(frame);

        if (scratchMode) {
          const mount = function () {
            requestAnimationFrame(function () { mountScratchCover(frame, img); });
          };
          if (img.complete && img.naturalWidth > 0) mount();
          else img.addEventListener('load', mount, { once: true });
        }

        answerEl.textContent = item.name;
        counterEl.textContent = index + 1;
        card.className = 'brand-card';
      }, 180);
    }

    function showFinished() {
      finished = true;
      card.className = 'brand-card switching';
      stage.classList.remove('show-answer');
      setTimeout(function () {
        brandEl.innerHTML =
          '<div class="done">' +
            '<div class="tick">&#10003;</div>' +
            '<h1>All ' + order.length + ', named.</h1>' +
            '<p>Tap Shuffle to play again.</p>' +
          '</div>';
        answerEl.textContent = '';
        counterEl.textContent = order.length;
        card.className = 'brand-card';
      }, 180);
    }

    function nextItem() {
      if (finished) { restart(); return; }
      if (index < order.length - 1) {
        index++;
        render();
      } else {
        showFinished();
      }
    }

    function prevItem() {
      if (finished) {
        finished = false;
        index = order.length - 1;
        render();
        return;
      }
      if (index > 0) {
        index--;
        render();
      }
    }

    function toggleAnswer() {
      if (finished) return;
      answerVisible = !answerVisible;
      stage.classList.toggle('show-answer', answerVisible);
    }

    function restart() {
      finished = false;
      shuffleInPlace(order);
      index = 0;
      totalEl.textContent = order.length;
      render();
    }

    function toggleScratch() {
      scratchMode = !scratchMode;
      scratchBtn.classList.toggle('on', scratchMode);
      if (!finished) render();
    }

    /* ---------- Input ---------- */

    document.addEventListener('keydown', function (e) {
      if (e.code === 'Space' || e.key === 'ArrowRight') { e.preventDefault(); nextItem(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); prevItem(); }
      else if (e.key === 'a' || e.key === 'A') { toggleAnswer(); }
      else if (e.key === 's' || e.key === 'S') { restart(); }
      else if (e.key === 'r' || e.key === 'R') { restart(); }
    });

    prevBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      prevItem();
    });
    nextBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      nextItem();
    });
    scratchBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      toggleScratch();
    });
    shuffleBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      restart();
    });

    /* ---------- First paint ---------- */
    shuffleInPlace(order);
    render();
  </script>
